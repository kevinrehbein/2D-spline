<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="main.js" defer></script>
    <link rel="stylesheet" href="style.css" />
    <title>2D Spline</title>
  </head>
  <body>
    <header>
      <p class="label">Curvas Paramétricas</p>
      <h1>Catmull-Rom Spline</h1>
      <p>Clique no canvas para adicionar pontos de controlo</p>
    </header>

    <div class="card">
      <canvas class="board" width="800" height="420"></canvas>
    </div>

    <div class="controls">
      <div class="points">
        <div class="dot-indicator"></div>
        <h5>Pontos: 0</h5>
      </div>
      <div class="buttons">
        <button id="clearbutton">Limpar</button>
        <button id="generatebutton">Gerar Curva</button>
      </div>
    </div>

    <p class="hint">Mínimo de <span>2 pontos</span> para gerar resultados</p>
  </body>
</html>
